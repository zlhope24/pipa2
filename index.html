<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>减数分裂交叉互换 · 触摸支持</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #c8e0b8;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #fefff7;
            border-radius: 60px;
            box-shadow: 0 25px 45px #1f542c;
            padding: 25px 30px 30px;
            border: 4px solid #b2d69e;
            max-width: 1300px;
            width: fit-content;
        }
        h2 {
            text-align: center;
            margin: 0 0 12px 0;
            color: #1f6e2d;
            font-size: 2.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 70px;
            background: #fffffc;
            box-shadow: inset 0 5px 15px #c2ddb2, 0 18px 32px #1b5e2d;
            width: 100%;
            height: auto;
            cursor: grab;
            touch-action: none;
        }
        canvas.dragging {
            cursor: grabbing;
        }
        .button-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 25px 0 5px;
        }
        .btn {
            background: #ebffe0;
            border: 3px solid #2f9140;
            color: #1c732b;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 14px 36px;
            border-radius: 60px;
            box-shadow: 0 7px 0 #247a33, 0 12px 22px #1d552b;
            cursor: pointer;
            transition: 0.07s;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active {
            transform: translateY(7px);
            box-shadow: 0 2px 0 #247a33, 0 9px 16px #1d552b;
        }
        .btn.continue {
            background: #fff2d3;
            border-color: #c2a137;
            color: #5f4d17;
            box-shadow: 0 7px 0 #a78228, 0 12px 22px #504527;
        }
        .btn.reset {
            background: #f7e3d0;
            border-color: #aa8652;
            color: #624a27;
            box-shadow: 0 7px 0 #886b3a, 0 12px 22px #4f402b;
        }
        .instruction {
            text-align: center;
            font-size: 1.2rem;
            margin: 15px 0 0;
            color: #2f763b;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>
        🧬 同源染色体交叉互换
    </h2>
    <canvas id="meiosisCanvas" width="1200" height="700"></canvas>
    <div class="instruction">
        👆 拖动染色体臂到另一臂末端即可交换片段
    </div>
    <div class="button-panel">
        <button class="btn continue" id="continueBtn">➡️ 继续分裂 (生成精细胞)</button>
        <button class="btn reset" id="resetBtn">⟲ 重置</button>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('meiosisCanvas');
        const ctx = canvas.getContext('2d');

        // ---------- 染色体数据 ----------
        const leftDark = {
            upper: { gene: 'B', color: '#1f4f9e' },
            lower: { gene: 'M', color: '#1f4f9e' }
        };
        const leftLight = {
            upper: { gene: 'B', color: '#7aa9f0' },
            lower: { gene: 'M', color: '#7aa9f0' }
        };
        const rightDark = {
            upper: { gene: 'b', color: '#b33131' },
            lower: { gene: 'm', color: '#b33131' }
        };
        const rightLight = {
            upper: { gene: 'b', color: '#f77a7a' },
            lower: { gene: 'm', color: '#f77a7a' }
        };

        let spermCells = [];
        let hotspots = [];
        let dragging = false;
        let dragSource = null;
        let mouseX = 0, mouseY = 0;

        function updateSperm() {
            spermCells = [
                { upper: leftDark.upper.gene, lower: leftDark.lower.gene },
                { upper: leftLight.upper.gene, lower: leftLight.lower.gene },
                { upper: rightDark.upper.gene, lower: rightDark.lower.gene },
                { upper: rightLight.upper.gene, lower: rightLight.lower.gene }
            ];
        }

        function resetAll() {
            leftDark.upper = { gene: 'B', color: '#1f4f9e' };
            leftDark.lower = { gene: 'M', color: '#1f4f9e' };
            leftLight.upper = { gene: 'B', color: '#7aa9f0' };
            leftLight.lower = { gene: 'M', color: '#7aa9f0' };
            rightDark.upper = { gene: 'b', color: '#b33131' };
            rightDark.lower = { gene: 'm', color: '#b33131' };
            rightLight.upper = { gene: 'b', color: '#f77a7a' };
            rightLight.lower = { gene: 'm', color: '#f77a7a' };
            spermCells = [];
            dragging = false;
            dragSource = null;
            draw();
        }

        function continueDivision() {
            updateSperm();
            draw();
        }

        function drawArm(startX, startY, endX, endY, color, gene, partId, recordHotspot=true) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 2.8;
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            const ctrlX = (startX + endX) / 2 + (startY - endY) * 0.2;
            const ctrlY = (startY + endY) / 2 + (endX - startX) * 0.2;
            ctx.quadraticCurveTo(ctrlX, ctrlY, endX, endY);
            ctx.stroke();

            ctx.font = 'bold 36px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'white';
            ctx.shadowBlur = 6;
            ctx.fillStyle = 'white';
            ctx.fillText(gene, endX, endY);
            ctx.shadowBlur = 0;
            ctx.fillStyle = color;
            ctx.fillText(gene, endX, endY);

            if (recordHotspot) {
                hotspots.push({
                    id: partId,
                    x: endX,
                    y: endY,
                    part: partId.includes('Upper') ? 'upper' : 'lower',
                    chr: partId.includes('leftDark') ? 'leftDark' :
                         partId.includes('leftLight') ? 'leftLight' :
                         partId.includes('rightDark') ? 'rightDark' : 'rightLight',
                    arm: partId.includes('Upper') ? 
                         (partId.includes('leftDark') ? leftDark.upper :
                          partId.includes('leftLight') ? leftLight.upper :
                          partId.includes('rightDark') ? rightDark.upper : rightLight.upper) :
                         (partId.includes('leftDark') ? leftDark.lower :
                          partId.includes('leftLight') ? leftLight.lower :
                          partId.includes('rightDark') ? rightDark.lower : rightLight.lower),
                    gene: gene,
                    color: color
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hotspots = [];

            const bigX = 600, bigY = 210, bigR = 180;
            ctx.save();
            ctx.beginPath();
            ctx.arc(bigX, bigY, bigR, 0, 2 * Math.PI);
            ctx.fillStyle = '#fefcf0';
            ctx.fill();
            ctx.strokeStyle = '#2f7a41';
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.fillStyle = '#2f7a41';
            ctx.font = 'bold 22px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('减数第一次分裂前期', bigX, bigY + 170);
            ctx.restore();

            const leftCX = bigX - 90, leftCY = bigY;
            drawArm(leftCX, leftCY, leftCX - 70, leftCY - 65, leftDark.upper.color, leftDark.upper.gene, 'leftDarkUpper', true);
            drawArm(leftCX, leftCY, leftCX - 70, leftCY + 65, leftDark.lower.color, leftDark.lower.gene, 'leftDarkLower', true);
            drawArm(leftCX, leftCY, leftCX + 70, leftCY - 65, leftLight.upper.color, leftLight.upper.gene, 'leftLightUpper', true);
            drawArm(leftCX, leftCY, leftCX + 70, leftCY + 65, leftLight.lower.color, leftLight.lower.gene, 'leftLightLower', true);

            const rightCX = bigX + 90, rightCY = bigY;
            drawArm(rightCX, rightCY, rightCX - 70, rightCY - 65, rightDark.upper.color, rightDark.upper.gene, 'rightDarkUpper', true);
            drawArm(rightCX, rightCY, rightCX - 70, rightCY + 65, rightDark.lower.color, rightDark.lower.gene, 'rightDarkLower', true);
            drawArm(rightCX, rightCY, rightCX + 70, rightCY - 65, rightLight.upper.color, rightLight.upper.gene, 'rightLightUpper', true);
            drawArm(rightCX, rightCY, rightCX + 70, rightCY + 65, rightLight.lower.color, rightLight.lower.gene, 'rightLightLower', true);

            const spermX = [280, 500, 720, 940];
            const spermY = 490;
            const spermR = 80;

            for (let i = 0; i < 4; i++) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(spermX[i], spermY, spermR, 0, 2 * Math.PI);
                ctx.fillStyle = '#fcf9ea';
                ctx.fill();
                ctx.strokeStyle = '#2e8a47';
                ctx.lineWidth = 3.5;
                ctx.stroke();
                ctx.fillStyle = '#1f682f';
                ctx.font = 'bold 22px "Segoe UI", sans-serif';
                ctx.fillText(`精细胞${i+1}`, spermX[i], spermY + 105);

                if (spermCells.length > 0 && spermCells[i]) {
                    let g = spermCells[i];
                    ctx.beginPath();
                    ctx.moveTo(spermX[i], spermY - 45);
                    ctx.lineTo(spermX[i], spermY + 45);
                    ctx.strokeStyle = '#4f3a22';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(spermX[i], spermY, 8, 0, 2 * Math.PI);
                    ctx.fillStyle = '#9b7b4a';
                    ctx.fill();

                    ctx.fillStyle = '#1e3d1e';
                    ctx.font = 'bold 32px "Courier New", monospace';
                    ctx.fillText(g.upper, spermX[i] - 45, spermY - 35);
                    ctx.fillText(g.lower, spermX[i] - 45, spermY + 45);
                }
                ctx.restore();
            }

            if (dragging && dragSource) {
                ctx.save();
                ctx.font = 'bold 36px "Courier New", monospace';
                ctx.fillStyle = dragSource.color;
                ctx.shadowColor = '#00000080';
                ctx.shadowBlur = 8;
                ctx.fillText(dragSource.gene, mouseX, mouseY - 12);
                ctx.restore();
            }
        }

        // 统一获取画布坐标 (支持鼠标和触摸事件)
        function getCanvasCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            if (e.touches) {
                // 触摸移动或开始
                if (e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else if (e.changedTouches) {
                    // 触摸结束事件使用 changedTouches
                    clientX = e.changedTouches[0].clientX;
                    clientY = e.changedTouches[0].clientY;
                } else {
                    return { x: 0, y: 0 };
                }
            } else {
                // 鼠标事件
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            const canvasX = (clientX - rect.left) * scaleX;
            const canvasY = (clientY - rect.top) * scaleY;
            return { x: canvasX, y: canvasY };
        }

        function handleStart(e) {
            e.preventDefault();
            const { x, y } = getCanvasCoordinates(e);

            const HOTSPOT_RADIUS = 35;
            let target = null;
            let minDist = Infinity;
            for (let h of hotspots) {
                let dist = Math.hypot(x - h.x, y - h.y);
                if (dist < HOTSPOT_RADIUS && dist < minDist) {
                    minDist = dist;
                    target = h;
                }
            }
            if (target) {
                dragging = true;
                dragSource = target;
                canvas.classList.add('dragging');
                draw();
            }
        }

        function handleMove(e) {
            if (!dragging) return;
            e.preventDefault();
            const { x, y } = getCanvasCoordinates(e);
            mouseX = x;
            mouseY = y;
            draw();
        }

        function handleEnd(e) {
            if (!dragging || !dragSource) {
                if (dragging) { dragging = false; canvas.classList.remove('dragging'); draw(); }
                return;
            }
            e.preventDefault();
            const { x, y } = getCanvasCoordinates(e); // 现在支持 changedTouches

            const HOTSPOT_RADIUS = 35;
            let target = null;
            let minDist = Infinity;
            for (let h of hotspots) {
                let dist = Math.hypot(x - h.x, y - h.y);
                if (dist < HOTSPOT_RADIUS && dist < minDist) {
                    minDist = dist;
                    target = h;
                }
            }

            if (target && dragSource) {
                const fromLeft = dragSource.chr.includes('left');
                const toRight = target.chr.includes('right');
                const fromRight = dragSource.chr.includes('right');
                const toLeft = target.chr.includes('left');
                const cross = (fromLeft && toRight) || (fromRight && toLeft);
                const samePart = (dragSource.part === target.part);
                
                const gene1 = dragSource.arm.gene;
                const gene2 = target.arm.gene;
                const geneMatch = (gene1.toUpperCase() === gene2.toUpperCase()) && (gene1 !== gene2);

                if (cross && samePart && geneMatch) {
                    let srcArm = dragSource.arm;
                    let tgtArm = target.arm;
                    let tempGene = srcArm.gene;
                    let tempColor = srcArm.color;
                    srcArm.gene = tgtArm.gene;
                    srcArm.color = tgtArm.color;
                    tgtArm.gene = tempGene;
                    tgtArm.color = tempColor;
                }
            }

            dragging = false;
            canvas.classList.remove('dragging');
            draw();
        }

        function handleCancel(e) {
            dragging = false;
            canvas.classList.remove('dragging');
            draw();
        }

        // 事件绑定
        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('mouseleave', handleCancel);

        canvas.addEventListener('touchstart', handleStart, { passive: false });
        canvas.addEventListener('touchmove', handleMove, { passive: false });
        canvas.addEventListener('touchend', handleEnd, { passive: false });
        canvas.addEventListener('touchcancel', handleCancel);

        document.getElementById('continueBtn').addEventListener('click', continueDivision);
        document.getElementById('resetBtn').addEventListener('click', resetAll);

        resetAll();
    })();
</script>
</body>
</html>
