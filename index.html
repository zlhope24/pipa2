<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>染色体结构变异模拟</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #ecf2fa;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 1300px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 30px 28px;
            box-shadow: 0 30px 50px rgba(0,15,40,0.25);
            border: 1px solid rgba(255,255,255,0.7);
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 650;
            margin: 0 0 10px 0;
            color: #0a1c33;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .sub {
            color: #2b405e;
            margin-bottom: 28px;
            font-size: 1.05rem;
            border-left: 6px solid #7999cf;
            padding-left: 20px;
            background: #f0f6ff;
            border-radius: 0 20px 20px 0;
            line-height: 1.5;
        }
        .canvas-container {
            background: #ffffff;
            border-radius: 36px;
            padding: 22px 10px 15px 10px;
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.02), 0 15px 30px rgba(0,25,60,0.15);
            border: 1px solid #d0dae8;
            margin: 18px 0 24px 0;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #ffffff;
            border-radius: 28px;
            cursor: pointer;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .variant-btn {
            background: white;
            border: 1px solid #b3c4db;
            padding: 12px 22px;
            border-radius: 60px;
            font-size: 1.15rem;
            font-weight: 550;
            color: #1a304c;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            transition: 0.15s;
            flex: 0 1 auto;
            min-width: 110px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            background: linear-gradient(0deg, #f5faff, white);
        }
        .variant-btn:hover {
            background: #e0ebfc;
            border-color: #6282b5;
            box-shadow: 0 12px 20px -12px #143259;
            transform: scale(1.02);
        }
        .variant-btn:active {
            background: #c8d6f0;
            transform: scale(0.98);
        }
        .reset {
            background: #eef2f7;
            color: #283b54;
            border-color: #a7bad2;
        }
        .selection-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 30px;
            background: #e2eaf8;
            padding: 18px 32px;
            border-radius: 60px;
            margin: 15px 0 18px 0;
            justify-content: space-between;
        }
        .radio-group {
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #102942;
            cursor: pointer;
            background: rgba(255,255,255,0.7);
            padding: 5px 16px;
            border-radius: 40px;
            transition: background 0.1s;
        }
        .radio-group label:hover {
            background: white;
        }
        input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #2d5a9c;
            cursor: pointer;
        }
        .status-row {
            display: flex;
            justify-content: center;
            margin: 20px 0 10px 0;
        }
        .status-badge {
            background: #b9cbe8;
            color: #0b1e36;
            border-radius: 32px;
            padding: 8px 30px;
            font-size: 1rem;
            font-weight: 600;
            font-family: monospace;
            letter-spacing: 1px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        footer {
            text-align: center;
            margin-top: 24px;
            color: #4e6a91;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🧬 染色体结构变异模拟</h1>
    <div class="sub">点击按钮探索易位、倒位、重复、缺失</div>

    <div class="canvas-container">
        <!-- 画布尺寸调整为1100x500，aspect-ratio同步 -->
        <canvas id="chromCanvas" width="1100" height="500" style="width:100%; height:auto; aspect-ratio:1100/500"></canvas>
    </div>

    <div class="toolbar">
        <button class="variant-btn" id="btnTranslocation">🔁 易位</button>
        <button class="variant-btn" id="btnParaInversion">🔂 臂内倒位</button>
        <button class="variant-btn" id="btnPeriInversion">🔄 臂间倒位</button>
        <button class="variant-btn" id="btnDuplication">📋 重复</button>
        <button class="variant-btn" id="btnDeletion">✂️ 缺失</button>
        <button class="variant-btn reset" id="btnReset">⟲ 重置</button>
    </div>

    <!-- 选择具体哪一条同源染色体 (4条) -->
    <div class="selection-row">
        <div class="radio-group">
            <label><input type="radio" name="chromTarget" value="1A" checked> 🧬 1A</label>
            <label><input type="radio" name="chromTarget" value="1B"> 🧬 1B</label>
            <label><input type="radio" name="chromTarget" value="2A"> 🧬 2A</label>
            <label><input type="radio" name="chromTarget" value="2B"> 🧬 2B</label>
        </div>
    </div>

    <!-- 仅保留片段计数，无图例色块 -->
    <div class="status-row">
        <div class="status-badge" id="bandCountDisplay">1A:12 1B:12 2A:8 2B:8</div>
    </div>
    <footer>🧬 双击画布重置</footer>
</div>

<script>
    (function() {
        // ----- 固定参数：放大染色体和字母，间距减小使布局紧凑 -----
        const BAND_WIDTH = 48;          // 每个片段宽度(px)
        const GAP = 2;
        const BAND_HEIGHT = 48;
        const START_X = 90;              // 第一条带左侧起点

        // 四条染色体的Y坐标 (间距减小为60，上下留白减小)
        const Y1A = 30;                  // 顶部留白30
        const Y1B = Y1A + BAND_HEIGHT + 60;  // 30+48+60=138
        const Y2A = Y1B + BAND_HEIGHT + 60;   // 138+48+60=246
        const Y2B = Y2A + BAND_HEIGHT + 60;   // 246+48+60=354
        // 画布高度500，底部留白 = 500 - (Y2B + BAND_HEIGHT) = 500 - (354+48) = 98

        // ----- 定义颜色池 -----
        const colorPalette = [
            '#E57373', '#64B5F6', '#81C784', '#FFB74D', '#BA68C8', '#FFD54F',
            '#4FC3F7', '#A1887F', '#F06292', '#7986CB', '#4DB6AC', '#FFF176',
            '#E57373', '#64B5F6'
        ];

        // ----- 生成第一对染色体片段 (左6右6，共12个) 标签 A ~ L -----
        function createLongBands() {
            const bands = [];
            const letters = 'ABCDEFGHIJKL'.split(''); // A到L共12个
            for (let i = 0; i < 12; i++) {
                bands.push({
                    color: colorPalette[i % colorPalette.length],
                    label: letters[i]
                });
            }
            return bands;
        }

        // ----- 生成第二对染色体片段 (左4右4，共8个) 标签 O ~ V -----
        function createShortBands() {
            const bands = [];
            const letters = 'OPQRSTUV'.split(''); // O到V共8个
            for (let i = 0; i < 8; i++) {
                bands.push({
                    color: colorPalette[i % colorPalette.length],
                    label: letters[i]
                });
            }
            return bands;
        }

        // 定义四个染色体对象
        let chrom1A = { bands: createLongBands(), cenIndex: 6 };  // 左臂6个
        let chrom1B = { bands: createLongBands(), cenIndex: 6 };
        let chrom2A = { bands: createShortBands(), cenIndex: 4 };
        let chrom2B = { bands: createShortBands(), cenIndex: 4 };

        const canvas = document.getElementById('chromCanvas');
        const ctx = canvas.getContext('2d');

        const radio1A = document.querySelector('input[value="1A"]');
        const radio1B = document.querySelector('input[value="1B"]');
        const radio2A = document.querySelector('input[value="2A"]');
        const radio2B = document.querySelector('input[value="2B"]');
        const bandCountSpan = document.getElementById('bandCountDisplay');

        // 工具：roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        // 绘制一条染色体 (带型 + 着丝粒)
        function drawChromosome(chrom, y, chrName) {
            const bands = chrom.bands;
            const cen = chrom.cenIndex;

            // 绘制左侧标签 (加粗，垂直居中，字号24)
            ctx.font = '800 24px "Segoe UI", "Arial", sans-serif';
            ctx.fillStyle = '#1e293b';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(chrName, 10, y + BAND_HEIGHT/2);

            // 绘制所有带型
            for (let i = 0; i < bands.length; i++) {
                const band = bands[i];
                const x = START_X + i * (BAND_WIDTH + GAP);
                ctx.beginPath();
                ctx.roundRect(x, y, BAND_WIDTH, BAND_HEIGHT, 8);
                ctx.fillStyle = band.color;
                ctx.fill();
                ctx.strokeStyle = '#ffffffcc';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // 绘制字母 (加粗，描边，字号28)
                ctx.font = '800 28px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = '#00000060';
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;
                ctx.fillStyle = 'white';
                ctx.fillText(band.label, x + BAND_WIDTH/2, y + BAND_HEIGHT/2);
                ctx.shadowColor = 'transparent';
                ctx.strokeStyle = '#0a0a0a';
                ctx.lineWidth = 2.5;
                ctx.strokeText(band.label, x + BAND_WIDTH/2, y + BAND_HEIGHT/2);
            }

            // 绘制着丝粒 (醒目红色，半径16)
            if (cen > 0 && cen < bands.length) {
                const xLeft = START_X + (cen - 1) * (BAND_WIDTH + GAP) + BAND_WIDTH;
                const xRight = START_X + cen * (BAND_WIDTH + GAP);
                const cenX = (xLeft + xRight) / 2;
                const cenY = y + BAND_HEIGHT/2;

                ctx.beginPath();
                ctx.arc(cenX, cenY, 16, 0, 2 * Math.PI);
                ctx.fillStyle = '#FF4444';
                ctx.shadowColor = '#AA0000AA';
                ctx.shadowBlur = 14;
                ctx.fill();
                ctx.shadowColor = 'transparent';
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(cenX-4, cenY-4, 6, 0, 2*Math.PI);
                ctx.fillStyle = '#FFFFFF';
                ctx.shadowBlur = 0;
                ctx.fill();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawChromosome(chrom1A, Y1A, '1A');
            drawChromosome(chrom1B, Y1B, '1B');
            drawChromosome(chrom2A, Y2A, '2A');
            drawChromosome(chrom2B, Y2B, '2B');

            bandCountSpan.innerText = `1A:${chrom1A.bands.length} 1B:${chrom1B.bands.length} 2A:${chrom2A.bands.length} 2B:${chrom2B.bands.length}`;
        }

        // ----- 获取当前选中的染色体对象及其类型 -----
        function getSelectedChromInfo() {
            if (radio1A.checked) return { chrom: chrom1A, type: 'long' };
            if (radio1B.checked) return { chrom: chrom1B, type: 'long' };
            if (radio2A.checked) return { chrom: chrom2A, type: 'short' };
            if (radio2B.checked) return { chrom: chrom2B, type: 'short' };
            return { chrom: chrom1A, type: 'long' };
        }

        // ----- 易位：1A/1B最后6个 ↔ 2A/2B最后1个 -----
        function applyTranslocation() {
            let pairLong, pairShort;
            if (radio1A.checked || radio2A.checked) {
                pairLong = chrom1A;
                pairShort = chrom2A;
            } else {
                pairLong = chrom1B;
                pairShort = chrom2B;
            }

            const bandsLong = pairLong.bands;
            const bandsShort = pairShort.bands;

            if (bandsLong.length < 6 || bandsShort.length < 1) {
                alert('染色体片段不足，无法进行易位（需要长染色体≥6，短染色体≥1）');
                return;
            }

            const longLastSix = bandsLong.splice(bandsLong.length - 6, 6);
            const shortLastOne = bandsShort.splice(bandsShort.length - 1, 1);

            bandsLong.push(...shortLastOne);
            bandsShort.push(...longLastSix);

            pairLong.cenIndex = 6;
            pairShort.cenIndex = 4;

            draw();
        }

        // ----- 臂内倒位：长染色体左臂最后5个片段反转；短染色体左臂最后2个片段反转 -----
        function applyParacentric() {
            const { chrom, type } = getSelectedChromInfo();
            const bands = chrom.bands;
            const cen = chrom.cenIndex;

            if (type === 'long') {
                if (cen < 5) {
                    alert('长染色体左臂不足5个片段，无法进行5片段臂内倒位');
                    return;
                }
                const i = cen - 5;
                const j = cen - 1;
                let left = i, right = j;
                while (left < right) {
                    [bands[left], bands[right]] = [bands[right], bands[left]];
                    left++;
                    right--;
                }
            } else {
                if (cen < 2) {
                    alert('短染色体左臂不足2个片段，无法进行臂内倒位');
                    return;
                }
                const i = cen - 2;
                const j = cen - 1;
                [bands[i], bands[j]] = [bands[j], bands[i]];
            }
            draw();
        }

        // ----- 臂间倒位：长染色体左臂最后6个 + 右臂第1个；短染色体左臂最后3个 + 右臂第1个 -----
        function applyPericentric() {
            const { chrom, type } = getSelectedChromInfo();
            const bands = chrom.bands;
            const cen = chrom.cenIndex;

            if (type === 'long') {
                if (cen < 6 || bands.length - cen < 1) {
                    alert('长染色体左臂不足6或右臂不足1，无法进行臂间倒位');
                    return;
                }
                const leftStart = cen - 6;
                const rightEnd = cen;
                if (leftStart < 0 || rightEnd >= bands.length) return;

                let i = leftStart, j = rightEnd;
                while (i < j) {
                    [bands[i], bands[j]] = [bands[j], bands[i]];
                    i++;
                    j--;
                }
                chrom.cenIndex = leftStart + 1;
            } else {
                if (cen < 3 || bands.length - cen < 1) {
                    alert('短染色体左臂不足3或右臂不足1，无法进行臂间倒位');
                    return;
                }
                const leftStart = cen - 3;
                const rightEnd = cen;
                if (leftStart < 0 || rightEnd >= bands.length) return;

                let i = leftStart, j = rightEnd;
                while (i < j) {
                    [bands[i], bands[j]] = [bands[j], bands[i]];
                    i++;
                    j--;
                }
                chrom.cenIndex = leftStart + 1;
            }
            draw();
        }

        // ----- 重复：长染色体复制最后4个片段并追加；短染色体复制最后3个片段并追加 -----
        function applyDuplication() {
            const { chrom, type } = getSelectedChromInfo();
            const bands = chrom.bands;
            if (type === 'long') {
                if (bands.length < 4) {
                    alert('长染色体片段不足4，无法重复最后4个片段');
                    return;
                }
                const lastFour = bands.slice(-4);
                const duplicates = lastFour.map(b => ({ color: b.color, label: b.label }));
                bands.push(...duplicates);
            } else {
                if (bands.length < 3) {
                    alert('短染色体片段不足3，无法重复最后3个片段');
                    return;
                }
                const lastThree = bands.slice(-3);
                const duplicates = lastThree.map(b => ({ color: b.color, label: b.label }));
                bands.push(...duplicates);
            }
            draw();
        }

        // ----- 缺失：长染色体删除最后5个片段；短染色体删除最后3个片段 -----
        function applyDeletion() {
            const { chrom, type } = getSelectedChromInfo();
            const bands = chrom.bands;
            if (type === 'long') {
                if (bands.length < 5) {
                    alert('长染色体片段不足5，无法删除最后5个片段');
                    return;
                }
                bands.splice(-5, 5);
            } else {
                if (bands.length < 3) {
                    alert('短染色体片段不足3，无法删除最后3个片段');
                    return;
                }
                bands.splice(-3, 3);
            }
            draw();
        }

        // ----- 重置所有染色体 -----
        function applyReset() {
            chrom1A = { bands: createLongBands(), cenIndex: 6 };
            chrom1B = { bands: createLongBands(), cenIndex: 6 };
            chrom2A = { bands: createShortBands(), cenIndex: 4 };
            chrom2B = { bands: createShortBands(), cenIndex: 4 };
            draw();
        }

        // 绑定按钮
        document.getElementById('btnTranslocation').addEventListener('click', applyTranslocation);
        document.getElementById('btnParaInversion').addEventListener('click', applyParacentric);
        document.getElementById('btnPeriInversion').addEventListener('click', applyPericentric);
        document.getElementById('btnDuplication').addEventListener('click', applyDuplication);
        document.getElementById('btnDeletion').addEventListener('click', applyDeletion);
        document.getElementById('btnReset').addEventListener('click', applyReset);
        canvas.addEventListener('dblclick', applyReset);

        draw();
    })();
</script>
</body>
</html>
