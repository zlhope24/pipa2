<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>染色体结构变异模拟</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #ecf2fa;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 1080px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 30px 28px;
            box-shadow: 0 30px 50px rgba(0,15,40,0.25);
            border: 1px solid rgba(255,255,255,0.7);
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 650;
            margin: 0 0 10px 0;
            color: #0a1c33;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .sub {
            color: #2b405e;
            margin-bottom: 28px;
            font-size: 1.05rem;
            border-left: 6px solid #7999cf;
            padding-left: 20px;
            background: #f0f6ff;
            border-radius: 0 20px 20px 0;
            line-height: 1.5;
        }
        .canvas-container {
            background: #ffffff;
            border-radius: 36px;
            padding: 22px 10px 15px 10px;
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.02), 0 15px 30px rgba(0,25,60,0.15);
            border: 1px solid #d0dae8;
            margin: 18px 0 24px 0;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #ffffff;
            border-radius: 28px;
            cursor: pointer;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .variant-btn {
            background: white;
            border: 1px solid #b3c4db;
            padding: 12px 22px;
            border-radius: 60px;
            font-size: 1.15rem;
            font-weight: 550;
            color: #1a304c;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            transition: 0.15s;
            flex: 0 1 auto;
            min-width: 110px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            background: linear-gradient(0deg, #f5faff, white);
        }
        .variant-btn:hover {
            background: #e0ebfc;
            border-color: #6282b5;
            box-shadow: 0 12px 20px -12px #143259;
            transform: scale(1.02);
        }
        .variant-btn:active {
            background: #c8d6f0;
            transform: scale(0.98);
        }
        .reset {
            background: #eef2f7;
            color: #283b54;
            border-color: #a7bad2;
        }
        .selection-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 30px;
            background: #e2eaf8;
            padding: 18px 32px;
            border-radius: 60px;
            margin: 15px 0 18px 0;
            justify-content: space-between;
        }
        .radio-group {
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #102942;
            cursor: pointer;
            background: rgba(255,255,255,0.7);
            padding: 5px 16px;
            border-radius: 40px;
            transition: background 0.1s;
        }
        .radio-group label:hover {
            background: white;
        }
        input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #2d5a9c;
            cursor: pointer;
        }
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 20px 30px;
            justify-content: center;
            margin: 22px 0 10px 0;
            font-size: 0.95rem;
            font-weight: 550;
            color: #1f3a60;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-dot {
            width: 26px;
            height: 18px;
            border-radius: 20px;
        }
        .status-badge {
            background: #b9cbe8;
            color: #0b1e36;
            border-radius: 32px;
            padding: 6px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: monospace;
        }
        footer {
            text-align: center;
            margin-top: 24px;
            color: #4e6a91;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🧬 染色体结构变异模拟</h1>
    <div class="sub">点击按钮探索易位、倒位、重复、缺失</div>

    <div class="canvas-container">
        <canvas id="chromCanvas" width="900" height="520" style="width:100%; height:auto; aspect-ratio:900/520"></canvas>
    </div>

    <div class="toolbar">
        <button class="variant-btn" id="btnTranslocation">🔁 易位</button>
        <button class="variant-btn" id="btnParaInversion">🔂 臂内倒位</button>
        <button class="variant-btn" id="btnPeriInversion">🔄 臂间倒位</button>
        <button class="variant-btn" id="btnDuplication">📋 重复</button>
        <button class="variant-btn" id="btnDeletion">✂️ 缺失</button>
        <button class="variant-btn reset" id="btnReset">⟲ 重置</button>
    </div>

    <!-- 选择具体哪一条同源染色体 (4条) -->
    <div class="selection-row">
        <div class="radio-group">
            <label><input type="radio" name="chromTarget" value="1A" checked> 🧬 1A</label>
            <label><input type="radio" name="chromTarget" value="1B"> 🧬 1B</label>
            <label><input type="radio" name="chromTarget" value="2A"> 🧬 2A</label>
            <label><input type="radio" name="chromTarget" value="2B"> 🧬 2B</label>
        </div>
        <!-- 提示信息已移除 -->
    </div>

    <!-- 图例 + 实时片段计数 -->
    <div class="legend">
        <div class="legend-item"><span class="legend-dot" style="background:#E57373;"></span> A</div>
        <div class="legend-item"><span class="legend-dot" style="background:#64B5F6;"></span> B</div>
        <div class="legend-item"><span class="legend-dot" style="background:#81C784;"></span> C</div>
        <div class="legend-item"><span class="legend-dot" style="background:#FFB74D;"></span> D</div>
        <div class="legend-item"><span class="legend-dot" style="background:#BA68C8;"></span> E</div>
        <div class="legend-item"><span class="legend-dot" style="background:#FFD54F;"></span> F</div>
        <div class="legend-item"><span class="legend-dot" style="background:#4FC3F7;"></span> G</div>
        <div class="legend-item"><span class="legend-dot" style="background:#A1887F;"></span> H</div>
        <div class="legend-item"><span class="legend-dot" style="background:#E57373;"></span> I</div>
        <div class="legend-item"><span class="legend-dot" style="background:#64B5F6;"></span> J</div>
        <div class="legend-item"><span class="legend-dot" style="background:#81C784;"></span> K</div>
        <div class="legend-item"><span class="legend-dot" style="background:#FFB74D;"></span> L</div>
        <div class="status-badge" id="bandCountDisplay">1A:8 1B:8 2A:4 2B:4</div>
    </div>
    <footer>🧬 双击画布重置</footer>
</div>

<script>
    (function() {
        // ----- 固定参数 -----
        const BAND_WIDTH = 38;          // 每个片段宽度(px)
        const GAP = 2;
        const BAND_HEIGHT = 34;
        const START_X = 90;              // 第一条带左侧起点

        // 四条染色体的Y坐标 (间距加大，容纳长染色体)
        const Y1A = 45;
        const Y1B = 150;
        const Y2A = 255;
        const Y2B = 360;

        // ----- 初始数据：第一对染色体 左臂4片段 A,B,C,D ; 右臂4片段 E,F,G,H -----
        const INIT_BANDS_LONG = [
            { color: '#E57373', label: 'A' },   // 左1
            { color: '#64B5F6', label: 'B' },   // 左2
            { color: '#81C784', label: 'C' },   // 左3
            { color: '#FFB74D', label: 'D' },   // 左4
            { color: '#BA68C8', label: 'E' },   // 右1
            { color: '#FFD54F', label: 'F' },   // 右2
            { color: '#4FC3F7', label: 'G' },   // 右3
            { color: '#A1887F', label: 'H' }    // 右4
        ];

        // 第二对染色体 (左臂2片段 I,J ; 右臂2片段 K,L)
        const INIT_BANDS_SHORT = [
            { color: '#E57373', label: 'I' },   // 左1
            { color: '#64B5F6', label: 'J' },   // 左2
            { color: '#81C784', label: 'K' },   // 右1
            { color: '#FFB74D', label: 'L' }    // 右2
        ];

        // 定义四个染色体对象，包含bands和着丝粒索引cenIndex
        let chrom1A = {
            bands: JSON.parse(JSON.stringify(INIT_BANDS_LONG)),
            cenIndex: 4   // 左臂4个片段(索引0-3)，右臂从索引4开始
        };
        let chrom1B = {
            bands: JSON.parse(JSON.stringify(INIT_BANDS_LONG)),
            cenIndex: 4
        };
        let chrom2A = {
            bands: JSON.parse(JSON.stringify(INIT_BANDS_SHORT)),
            cenIndex: 2   // 左臂2个片段(索引0-1)，右臂从索引2开始
        };
        let chrom2B = {
            bands: JSON.parse(JSON.stringify(INIT_BANDS_SHORT)),
            cenIndex: 2
        };

        const canvas = document.getElementById('chromCanvas');
        const ctx = canvas.getContext('2d');

        // 获取单选按钮
        const radio1A = document.querySelector('input[value="1A"]');
        const radio1B = document.querySelector('input[value="1B"]');
        const radio2A = document.querySelector('input[value="2A"]');
        const radio2B = document.querySelector('input[value="2B"]');
        const bandCountSpan = document.getElementById('bandCountDisplay');

        // 工具：roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        // 绘制一条染色体 (带型 + 着丝粒)
        function drawChromosome(chrom, y, chrName) {
            const bands = chrom.bands;
            const cen = chrom.cenIndex;
            // 绘制左侧标签
            ctx.font = 'bold 16px "Segoe UI", "Arial", sans-serif';
            ctx.fillStyle = '#1e293b';
            ctx.fillText(chrName, 10, y + BAND_HEIGHT/2 + 6);

            // 绘制所有带型
            for (let i = 0; i < bands.length; i++) {
                const band = bands[i];
                const x = START_X + i * (BAND_WIDTH + GAP);
                ctx.beginPath();
                ctx.roundRect(x, y, BAND_WIDTH, BAND_HEIGHT, 8);
                ctx.fillStyle = band.color;
                ctx.fill();
                ctx.strokeStyle = '#ffffffcc';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // 绘制字母
                ctx.font = 'bold 20px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = '#00000060';
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;
                ctx.fillStyle = 'white';
                ctx.fillText(band.label, x + BAND_WIDTH/2, y + BAND_HEIGHT/2);
                ctx.shadowColor = 'transparent';
                ctx.strokeStyle = '#0a0a0a';
                ctx.lineWidth = 1.5;
                ctx.strokeText(band.label, x + BAND_WIDTH/2, y + BAND_HEIGHT/2);
            }

            // 绘制着丝粒 (位于索引 cen-1 和 cen 之间)
            if (cen > 0 && cen < bands.length) {
                const xLeft = START_X + (cen - 1) * (BAND_WIDTH + GAP) + BAND_WIDTH;
                const xRight = START_X + cen * (BAND_WIDTH + GAP);
                const cenX = (xLeft + xRight) / 2;
                const cenY = y + BAND_HEIGHT/2;

                ctx.beginPath();
                ctx.arc(cenX, cenY, 8, 0, 2 * Math.PI);
                ctx.fillStyle = '#2c3e50';
                ctx.shadowColor = '#00000050';
                ctx.shadowBlur = 7;
                ctx.fill();
                ctx.shadowColor = 'transparent';
                ctx.strokeStyle = '#f0f3f8';
                ctx.lineWidth = 2;
                ctx.stroke();
                // 高光
                ctx.beginPath();
                ctx.arc(cenX-1.5, cenY-1.5, 3, 0, 2*Math.PI);
                ctx.fillStyle = '#f5f9ff';
                ctx.fill();
            }
        }

        // 主绘制
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawChromosome(chrom1A, Y1A, '1A');
            drawChromosome(chrom1B, Y1B, '1B');
            drawChromosome(chrom2A, Y2A, '2A');
            drawChromosome(chrom2B, Y2B, '2B');

            // 更新计数
            bandCountSpan.innerText = `1A:${chrom1A.bands.length} 1B:${chrom1B.bands.length} 2A:${chrom2A.bands.length} 2B:${chrom2B.bands.length}`;
        }

        // ----- 获取当前选中的染色体对象 -----
        function getSelectedChrom() {
            if (radio1A.checked) return chrom1A;
            if (radio1B.checked) return chrom1B;
            if (radio2A.checked) return chrom2A;
            if (radio2B.checked) return chrom2B;
            return chrom1A;
        }

        // ----- 易位（原不等易位）：1A的最后3个片段 ↔ 2A的最后2个片段 (同源对之间) -----
        function applyTranslocation() {
            let pairLong, pairShort;  // pairLong是第一对成员，pairShort是第二对成员
            if (radio1A.checked || radio2A.checked) {
                pairLong = chrom1A;
                pairShort = chrom2A;
            } else {
                pairLong = chrom1B;
                pairShort = chrom2B;
            }

            const bandsLong = pairLong.bands;
            const bandsShort = pairShort.bands;

            // 需要长染色体至少3个片段，短染色体至少2个片段
            if (bandsLong.length < 3 || bandsShort.length < 2) {
                alert('染色体片段不足，无法进行易位（需要长染色体≥3，短染色体≥2）');
                return;
            }

            // 保存长染色体的最后3个片段和短染色体的最后2个片段
            const longLastThree = bandsLong.splice(bandsLong.length - 3, 3);
            const shortLastTwo = bandsShort.splice(bandsShort.length - 2, 2);

            // 将短染色体的2个片段插入到长染色体末尾
            bandsLong.push(...shortLastTwo);
            // 将长染色体的3个片段插入到短染色体末尾
            bandsShort.push(...longLastThree);

            // 更新着丝粒索引：
            // 对于长染色体：左臂不变（原来cenIndex是4，左臂4个），移除的3个片段全部来自右臂，插入的2个片段进入右臂
            // 新右臂长度 = 原右臂长度 - 3 + 2 = 4 -3 +2 = 3，左臂仍为4，所以新cenIndex = 4
            pairLong.cenIndex = 4;   // 左臂4个不变
            // 对于短染色体：左臂不变（原来2个），移除的2个全部来自右臂，插入的3个进入右臂
            // 新右臂长度 = 原右臂长度 -2 +3 = 2 -2 +3 = 3，左臂仍2，新cenIndex = 2
            pairShort.cenIndex = 2;

            draw();
        }

        // ----- 臂内倒位 (左臂内最后两个片段) -----
        function applyParacentric() {
            const chrom = getSelectedChrom();
            const bands = chrom.bands;
            const cen = chrom.cenIndex;
            if (cen < 2) {
                alert('左臂片段不足2个，无法进行臂内倒位');
                return;
            }
            // 反转左臂最后两个片段: 索引 cen-2 和 cen-1
            const i = cen - 2;
            const j = cen - 1;
            [bands[i], bands[j]] = [bands[j], bands[i]];
            // 着丝粒索引不变
            draw();
        }

        // ----- 臂间倒位 (左臂最后3个 + 右臂前1个) 区间 [cen-3, cen] -----
        function applyPericentric() {
            const chrom = getSelectedChrom();
            const bands = chrom.bands;
            const cen = chrom.cenIndex;
            // 需要左臂至少3个且右臂至少1个
            if (cen < 3 || bands.length - cen < 1) {
                alert('需要左臂≥3且右臂≥1才能进行臂间倒位');
                return;
            }
            const leftStart = cen - 3;   // 左臂最后三个索引: cen-3, cen-2, cen-1
            const rightEnd = cen;        // 右臂第一个片段索引 cen
            if (leftStart < 0 || rightEnd >= bands.length) {
                alert('区间超出范围');
                return;
            }
            // 反转区间 [leftStart, rightEnd]
            let i = leftStart, j = rightEnd;
            while (i < j) {
                [bands[i], bands[j]] = [bands[j], bands[i]];
                i++;
                j--;
            }
            // 更新着丝粒索引：新左臂长度 = leftStart (区间左侧片段数) + (原右臂在区间内的个数，即1个)
            const newCen = leftStart + 1;
            chrom.cenIndex = newCen;
            draw();
        }

        // ----- 重复 (复制索引1的片段，插入到索引2前) -----
        function applyDuplication() {
            const chrom = getSelectedChrom();
            const bands = chrom.bands;
            const cen = chrom.cenIndex;
            if (bands.length < 2) {
                alert('至少需要2个片段才能重复第二个片段');
                return;
            }
            const bandToCopy = bands[1];
            const duplicate = { color: bandToCopy.color, label: bandToCopy.label };
            // 插入在索引2前 (即原索引1之后)
            bands.splice(2, 0, duplicate);
            // 更新着丝粒索引
            if (2 < cen) {
                chrom.cenIndex += 1;
            } else if (2 == cen) {
                chrom.cenIndex += 1;
            }
            // 否则不变
            draw();
        }

        // ----- 缺失 (删除索引1的片段) -----
        function applyDeletion() {
            const chrom = getSelectedChrom();
            const bands = chrom.bands;
            const cen = chrom.cenIndex;
            if (bands.length < 2) {
                alert('至少需要2个片段才能删除第二个片段');
                return;
            }
            bands.splice(1, 1);
            if (1 < cen) {
                chrom.cenIndex -= 1;
            } else if (1 == cen) {
                chrom.cenIndex -= 1;
            }
            draw();
        }

        // ----- 重置所有染色体 -----
        function applyReset() {
            chrom1A = {
                bands: JSON.parse(JSON.stringify(INIT_BANDS_LONG)),
                cenIndex: 4
            };
            chrom1B = {
                bands: JSON.parse(JSON.stringify(INIT_BANDS_LONG)),
                cenIndex: 4
            };
            chrom2A = {
                bands: JSON.parse(JSON.stringify(INIT_BANDS_SHORT)),
                cenIndex: 2
            };
            chrom2B = {
                bands: JSON.parse(JSON.stringify(INIT_BANDS_SHORT)),
                cenIndex: 2
            };
            draw();
        }

        // 绑定按钮
        document.getElementById('btnTranslocation').addEventListener('click', applyTranslocation);
        document.getElementById('btnParaInversion').addEventListener('click', applyParacentric);
        document.getElementById('btnPeriInversion').addEventListener('click', applyPericentric);
        document.getElementById('btnDuplication').addEventListener('click', applyDuplication);
        document.getElementById('btnDeletion').addEventListener('click', applyDeletion);
        document.getElementById('btnReset').addEventListener('click', applyReset);
        canvas.addEventListener('dblclick', applyReset);

        // 初始化绘制
        draw();
    })();
</script>
</body>
</html>
